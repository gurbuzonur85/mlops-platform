name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - '23_k8s_cicd_monitoring/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - '23_k8s_cicd_monitoring/**'

# Allow the update-manifest job to commit back the bumped SHA tag.
permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/ml-prediction

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — lint
  # ────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 23_k8s_cicd_monitoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — build & push image to GHCR (main only)
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: 23_k8s_cicd_monitoring
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.short_sha }}

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — bump the image tag in k8s/ and commit back
  # ────────────────────────────────────────────────────────────────
  # ArgoCD watches k8s/, sees the updated tag, and rolls the Deployment.
  # The `[skip ci]` in the commit message prevents this push from
  # triggering the workflow again.
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the push back includes a real merge base.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in deployment manifest
        run: |
          cd 23_k8s_cicd_monitoring
          SHA="${{ needs.build-and-push.outputs.short_sha }}"
          IMAGE="${{ env.IMAGE }}"

          # Replace whatever tag is currently on the ml-prediction image with
          # the freshly-pushed short SHA. We anchor on the image name so we
          # don't accidentally edit anything else.
          sed -i -E "s#(image: ${IMAGE//\//\\/}):.*#\1:${SHA}#" k8s/ml-prediction-deployment.yaml

          echo "--- diff ---"
          git diff k8s/ml-prediction-deployment.yaml

      - name: Commit and push
        run: |
          cd 23_k8s_cicd_monitoring
          if git diff --quiet k8s/ml-prediction-deployment.yaml; then
            echo "No tag change — image already at this SHA."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/ml-prediction-deployment.yaml
          git commit -m "chore(23_k8s_cicd_monitoring): bump image to ${{ needs.build-and-push.outputs.short_sha }} [skip ci]"
          git push
