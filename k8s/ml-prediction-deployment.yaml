apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-prediction-deployment
  labels:
    app: ml-prediction
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-prediction
  template:
    metadata:
      labels:
        app: ml-prediction
    spec:
      containers:
      - name: ml-prediction
        # Image is pulled from Docker Hub. The CI workflow
        # (.github/workflows/ci.yaml) builds + pushes on every push to main,
        # and its `update-manifest` job rewrites the tag below to the new
        # short SHA and commits it back. ArgoCD sees the manifest change and
        # rolls the Deployment.
        # IfNotPresent lets Docker Desktop's k8s reuse a locally-built image
        # of the same tag without forcing a registry pull.
        image: ghcr.io/gurbuzonur85/mlops-platform/ml-prediction:77b6227
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SQLALCHEMY_DATABASE_URL
          # Reaches the postgres Service defined in k8s/postgres.yaml
          # over the cluster DNS name `postgres` (default namespace).
          value: "postgresql+psycopg2://train:Ankara06@postgres:5432/traindb"
        # LLM settings for /llm/chat. Create the Secret from your .env with:
        #   kubectl create secret generic app-secret --from-env-file=.env
        # All three are optional: without them the app still boots and only
        # /llm/chat errors (503). LLM_PROVIDER selects the backend
        # ("google_genai" default, or "openrouter").
        - name: LLM_PROVIDER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: LLM_PROVIDER
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: GOOGLE_API_KEY
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: OPENROUTER_API_KEY
              optional: true
        # Probes hit the /healthz endpoint defined in main.py.
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ml-prediction
  labels:
    app: ml-prediction
spec:
  type: NodePort
  selector:
    app: ml-prediction
  ports:
  - port: 8000
    targetPort: http
    nodePort: 30080
    protocol: TCP
    name: http
